[project]
name = "techtide-agents"
version = "0.5.0"
description = "Python LangGraph/LangChain runtime for TechTideAI"
requires-python = ">=3.11"
dependencies = [
  "langchain>=0.2.0",
  "langchain-openai>=0.1.0",
  "langchain-anthropic>=0.1.0",
  "langgraph>=0.2.0",
  "pydantic>=2.6.0",
  "python-dotenv>=1.2.2"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "ruff>=0.4.0",
  "httpx>=0.27.0"
]
server = [
  "fastapi>=0.110.0",
  "uvicorn>=0.29.0"
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Generated files: drift-checked by pnpm tsx scripts/sync-contracts.ts.
# Do not ruff-check them; edits would be overwritten by the next sync.
"src/techtide_agents/contracts/generated.py" = ["ALL"]
"notebooks/_bridge.py" = ["ALL"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["techtide_agents"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "raise NotImplementedError"]
