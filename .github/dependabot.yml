version: 2

# Phase 7.3: monthly cadence + groups are designed so the next PR backlog
# stays small. The CI policy (pnpm run verify must pass; CODEOWNERS must
# approve) is the implicit gate.

updates:
  # ── Root + all pnpm workspaces ──
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    groups:
      typescript:
        patterns: ["typescript", "@typescript-eslint/*"]
      eslint:
        patterns: ["eslint", "eslint-*", "@eslint/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      fastify:
        patterns: ["fastify", "@fastify/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "tailwind-merge"]
      ai-sdks:
        patterns: ["openai", "@anthropic-ai/*", "@mastra/*", "mastra"]
      supabase:
        patterns: ["@supabase/*"]
      tsx:
        patterns: ["tsx"]

  # ── Python agents ──
  - package-ecosystem: pip
    directory: /agents/python
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
    groups:
      langchain:
        patterns: ["langchain*", "langgraph*"]
      server:
        patterns: ["fastapi", "uvicorn"]
      dev:
        patterns: ["pytest*", "ruff", "httpx"]

  # ── GitHub Actions ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
