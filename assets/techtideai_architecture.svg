<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>TechTideAI architecture</title>
  <desc>Operator console to Fastify backend to Mastra (TypeScript) and LangGraph (Python) runtimes, with Supabase, Weaviate, OpenTelemetry, and the eval / approval / post-mortem surfaces.</desc>

  <style>
    .box { fill: #0f172a; stroke: #94a3b8; stroke-width: 1.4; rx: 8; ry: 8; }
    .box-soft { fill: #f1f5f9; stroke: #475569; stroke-width: 1.4; rx: 8; ry: 8; }
    .box-warm { fill: #fef3c7; stroke: #b45309; stroke-width: 1.4; rx: 8; ry: 8; }
    .box-cool { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.4; rx: 8; ry: 8; }
    .box-green { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; ry: 8; }
    .title { fill: #0f172a; font-weight: 700; }
    .sub { fill: #475569; font-size: 11px; }
    .edge { stroke: #475569; stroke-width: 1.4; fill: none; }
    .edge-dashed { stroke: #64748b; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
    .edge-warm { stroke: #b45309; stroke-width: 1.4; fill: none; }
    .arrow { fill: #475569; }
    .arrow-warm { fill: #b45309; }
    text { fill: #0f172a; }
  </style>

  <!-- Operator Console -->
  <rect x="380" y="20" width="320" height="60" class="box"/>
  <text x="540" y="46" text-anchor="middle" class="title">Operator Console</text>
  <text x="540" y="64" text-anchor="middle" class="sub">React + Vite + Tailwind, port 5180</text>

  <!-- Fastify Backend -->
  <rect x="380" y="120" width="320" height="60" class="box"/>
  <text x="540" y="146" text-anchor="middle" class="title">Fastify Backend</text>
  <text x="540" y="164" text-anchor="middle" class="sub">TypeScript, port 4050, Zod everywhere</text>

  <!-- Arrow from console to backend -->
  <path d="M 540 80 L 540 120" class="edge"/>
  <polygon points="535,114 540,124 545,114" class="arrow"/>
  <text x="548" y="105" class="sub">fetch /api/*</text>

  <!-- Three planes row -->
  <rect x="20" y="220" width="220" height="120" class="box-cool"/>
  <text x="130" y="246" text-anchor="middle" class="title">Control Plane</text>
  <text x="130" y="266" text-anchor="middle" class="sub">agents/src/core/registry.ts</text>
  <text x="130" y="282" text-anchor="middle" class="sub">agents/python/.../dispatcher.py</text>
  <text x="130" y="300" text-anchor="middle" class="sub">ApprovalPolicy in @techtide/agents</text>
  <text x="130" y="318" text-anchor="middle" class="sub">agents/runtime_config.yaml</text>

  <rect x="280" y="220" width="220" height="120" class="box-warm"/>
  <text x="390" y="246" text-anchor="middle" class="title">Execution Plane</text>
  <text x="390" y="266" text-anchor="middle" class="sub">Mastra (TypeScript): tools + skills</text>
  <text x="390" y="282" text-anchor="middle" class="sub">LangGraph (Python): state graphs</text>
  <text x="390" y="300" text-anchor="middle" class="sub">OpenAI / Anthropic adapters</text>
  <text x="390" y="318" text-anchor="middle" class="sub">Contract types: IAgentRuntime</text>

  <rect x="540" y="220" width="220" height="120" class="box-green"/>
  <text x="650" y="246" text-anchor="middle" class="title">Evidence Plane</text>
  <text x="650" y="266" text-anchor="middle" class="sub">run_events (append-only)</text>
  <text x="650" y="282" text-anchor="middle" class="sub">OpenTelemetry trace surface</text>
  <text x="650" y="300" text-anchor="middle" class="sub">EvalRun + scorer versions</text>
  <text x="650" y="318" text-anchor="middle" class="sub">Post-mortems to docs/EVALS</text>

  <rect x="800" y="220" width="260" height="120" class="box-soft"/>
  <text x="930" y="246" text-anchor="middle" class="title">Product Plane</text>
  <text x="930" y="266" text-anchor="middle" class="sub">/dashboard/agents, /runs, /evals</text>
  <text x="930" y="282" text-anchor="middle" class="sub">/dashboard/sprints, /approvals</text>
  <text x="930" y="300" text-anchor="middle" class="sub">Operator decisions are recorded.</text>
  <text x="930" y="318" text-anchor="middle" class="sub">Audit replay from any event.</text>

  <!-- Backend to all three planes -->
  <path d="M 540 180 L 130 220" class="edge"/>
  <path d="M 540 180 L 390 220" class="edge"/>
  <path d="M 540 180 L 650 220" class="edge"/>
  <path d="M 540 180 L 930 220" class="edge"/>

  <!-- Postgres + Weaviate -->
  <rect x="20" y="420" width="320" height="80" class="box-soft"/>
  <text x="180" y="446" text-anchor="middle" class="title">Supabase (Postgres + Auth + RLS)</text>
  <text x="180" y="464" text-anchor="middle" class="sub">run_events, EvalRun, ApprovalRequest</text>
  <text x="180" y="482" text-anchor="middle" class="sub">RLS gates per-org reads</text>

  <rect x="380" y="420" width="320" height="80" class="box-soft"/>
  <text x="540" y="446" text-anchor="middle" class="title">Weaviate</text>
  <text x="540" y="464" text-anchor="middle" class="sub">Vector memory per agent</text>
  <text x="540" y="482" text-anchor="middle" class="sub">Vectorizer module: none (BYO embedder)</text>

  <rect x="740" y="420" width="320" height="80" class="box-soft"/>
  <text x="900" y="446" text-anchor="middle" class="title">OpenTelemetry</text>
  <text x="900" y="464" text-anchor="middle" class="sub">Per-span eval.* attributes</text>
  <text x="900" y="482" text-anchor="middle" class="sub">OTLP export to Jaeger / Tempo</text>

  <!-- Edges from planes to data -->
  <path d="M 130 340 L 130 420" class="edge-dashed"/>
  <path d="M 390 340 L 540 420" class="edge-dashed"/>
  <path d="M 650 340 L 180 420" class="edge-warm"/>
  <path d="M 650 340 L 900 420" class="edge-dashed"/>

  <!-- Eval / Approval / Post-mortem tail -->
  <rect x="20" y="540" width="1040" height="120" class="box-soft"/>
  <text x="40" y="568" class="title">Eval harness</text>
  <text x="40" y="586" class="sub">golden-tasks.v1.json, 33 tasks, 4 scorers</text>
  <text x="40" y="602" class="sub">regression threshold: 5% drop</text>
  <text x="40" y="618" class="sub">writes docs/EVALS/latest.json</text>

  <text x="380" y="568" class="title">Approval gate</text>
  <text x="380" y="586" class="sub">risk tiers: read, write, external,</text>
  <text x="380" y="602" class="sub">destructive, billing</text>
  <text x="380" y="618" class="sub">policyVersion stamped on every row</text>

  <text x="700" y="568" class="title">Three-agent harness</text>
  <text x="700" y="586" class="sub">generator + evaluator + judge</text>
  <text x="700" y="602" class="sub">convergence: succeeded / plateau /</text>
  <text x="700" y="618" class="sub">max-iterations / errored</text>

  <text x="40" y="640" class="sub" fill="#b45309">Read [CHANGELOG.md](CHANGELOG.md), [QUALITY_GATES.md](docs/QUALITY_GATES.md), and the nine ADRs under docs/adr/ for the load-bearing choices behind this surface.</text>
</svg>
