<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>Segment 2: the human gate</title>
  <desc>A run starts queued, transitions through running, and (when the policy classifies the action as high risk, i.e. external, destructive, or billing) pauses at approval_requested until a human operator decides. The decision is recorded in run_events with the policy version stamped on the row, so a future audit can replay the decision against the policy in force at the time. StatusTransitionPolicy is the single source of truth for legal transitions; extend via extend() (OCP), never mutate the default.</desc>

  <style>
    .node { fill: #f1f5f9; stroke: #475569; stroke-width: 1.4; rx: 8; ry: 8; }
    .ok { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; ry: 8; }
    .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; ry: 8; }
    .approval { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; ry: 8; }
    .title { fill: #0f172a; font-weight: 700; }
    .h { fill: #0f172a; font-weight: 700; font-size: 22px; }
    .sub { fill: #475569; font-size: 11px; }
    .label { fill: #b45309; font-weight: 700; font-size: 13px; }
    .inv { fill: #15803d; font-weight: 700; font-size: 14px; }
    .edge { stroke: #475569; stroke-width: 1.4; fill: none; }
    .edge-warm { stroke: #b45309; stroke-width: 1.6; fill: none; }
    .arrow { fill: #475569; }
    .arrow-warm { fill: #b45309; }
    text { fill: #0f172a; }
  </style>

  <text x="540" y="50" text-anchor="middle" class="h">Segment 2: The Human Gate</text>
  <text x="540" y="78" text-anchor="middle" class="label">"Auto-approve a vendor payment under $1,000."</text>

  <rect x="20" y="130" width="130" height="60" class="node"/>
  <text x="85" y="154" text-anchor="middle" class="title">queued</text>
  <text x="85" y="172" text-anchor="middle" class="sub">submitted</text>

  <rect x="190" y="130" width="130" height="60" class="node"/>
  <text x="255" y="154" text-anchor="middle" class="title">running</text>
  <text x="255" y="172" text-anchor="middle" class="sub">tool calls + events</text>

  <rect x="360" y="120" width="180" height="80" class="approval"/>
  <text x="450" y="148" text-anchor="middle" class="title">approval_requested</text>
  <text x="450" y="166" text-anchor="middle" class="sub">risk tier: billing</text>
  <text x="450" y="184" text-anchor="middle" class="sub">$900 vendor payment</text>
  <text x="450" y="200" text-anchor="middle" class="label">PAUSED</text>

  <rect x="580" y="130" width="130" height="60" class="node"/>
  <text x="645" y="154" text-anchor="middle" class="title">running</text>
  <text x="645" y="172" text-anchor="middle" class="sub">operator granted</text>

  <rect x="750" y="130" width="130" height="60" class="ok"/>
  <text x="815" y="154" text-anchor="middle" class="title">succeeded</text>
  <text x="815" y="172" text-anchor="middle" class="sub">output captured</text>

  <rect x="750" y="220" width="130" height="60" class="bad"/>
  <text x="815" y="244" text-anchor="middle" class="title">failed</text>
  <text x="815" y="262" text-anchor="middle" class="sub">error or denied</text>

  <rect x="360" y="320" width="180" height="60" class="bad"/>
  <text x="450" y="344" text-anchor="middle" class="title">approval_denied</text>
  <text x="450" y="362" text-anchor="middle" class="sub">operator denied</text>

  <path d="M 150 160 L 190 160" class="edge"/>
  <polygon points="184,154 194,162 184,170" class="arrow"/>
  <path d="M 320 160 L 360 160" class="edge-warm"/>
  <polygon points="354,154 364,162 354,170" class="arrow-warm"/>
  <text x="340" y="150" class="sub">policy: high-risk</text>

  <path d="M 540 160 L 580 160" class="edge"/>
  <polygon points="574,154 584,162 574,170" class="arrow"/>
  <text x="560" y="150" class="sub">granted</text>

  <path d="M 580 160 L 750 160" class="edge"/>
  <polygon points="744,154 754,162 744,170" class="arrow"/>

  <path d="M 320 190 L 750 250" class="edge"/>
  <path d="M 540 190 L 450 320" class="edge-warm"/>
  <polygon points="456,316 446,324 456,332" class="arrow-warm"/>
  <text x="500" y="312" class="sub">denied</text>

  <rect x="40" y="430" width="1000" height="80" fill="#dcfce7" stroke="#15803d"/>
  <text x="540" y="460" text-anchor="middle" class="inv">Invariant: every transition emits a run_event with runId, eventType, payload, createdAt.</text>
  <text x="540" y="480" text-anchor="middle" class="sub">ApprovalRequest row carries the policyVersion stamp. Audit replay: future operator can replay the decision against the policy in force at the time.</text>
</svg>
