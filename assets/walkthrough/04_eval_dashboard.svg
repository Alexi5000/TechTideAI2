<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>Segment 3: the eval harness is the regression dashboard</title>
  <desc>The eval harness runs a 33-task golden suite against the live agent configuration. The harness compares the current pass rate to a frozen baseline; if the pass rate drops more than EVAL_REGRESSION_THRESHOLD_PCT (default 5%), EvalRegressionDetectedError fires and the CI Gate fails. A nightly run writes docs/EVALS/latest.json. The eval suite is the regression dashboard.</desc>

  <style>
    .box { fill: #f1f5f9; stroke: #475569; stroke-width: 1.4; rx: 8; ry: 8; }
    .ok { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; ry: 8; }
    .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; ry: 8; }
    .line { fill: none; stroke: #1d4ed8; stroke-width: 1.5; }
    .bar { fill: #1d4ed8; }
    .bar-low { fill: #b91c1c; }
    .title { fill: #0f172a; font-weight: 700; }
    .h { fill: #0f172a; font-weight: 700; font-size: 22px; }
    .sub { fill: #475569; font-size: 11px; }
    .label { fill: #15803d; font-weight: 700; font-size: 13px; }
    .num { fill: #0f172a; font-weight: 700; font-size: 24px; }
    text { fill: #0f172a; }
  </style>

  <text x="540" y="50" text-anchor="middle" class="h">Segment 3: The Eval is the Regression Dashboard</text>

  <rect x="40" y="100" width="240" height="120" class="box"/>
  <text x="160" y="128" text-anchor="middle" class="label">Latest run</text>
  <text x="160" y="170" text-anchor="middle" class="num">82%</text>
  <text x="160" y="195" text-anchor="middle" class="sub">27 / 33 tasks passed</text>
  <text x="160" y="212" text-anchor="middle" class="sub">gpt-4o + gpt-4o judge</text>

  <rect x="320" y="100" width="240" height="120" class="box"/>
  <text x="440" y="128" text-anchor="middle" class="label">Frozen baseline</text>
  <text x="440" y="170" text-anchor="middle" class="num">80%</text>
  <text x="440" y="195" text-anchor="middle" class="sub">26.4 / 33 tasks</text>
  <text x="440" y="212" text-anchor="middle" class="sub">v1.0.0 baseline</text>

  <rect x="600" y="100" width="240" height="120" class="ok"/>
  <text x="720" y="128" text-anchor="middle" class="label">Status</text>
  <text x="720" y="170" text-anchor="middle" class="num" fill="#15803d">+2%</text>
  <text x="720" y="195" text-anchor="middle" class="sub">within 5% threshold</text>
  <text x="720" y="212" text-anchor="middle" class="sub">no regression fired</text>

  <rect x="880" y="100" width="160" height="120" class="box"/>
  <text x="960" y="128" text-anchor="middle" class="label">Cost</text>
  <text x="960" y="170" text-anchor="middle" class="num">$0.61</text>
  <text x="960" y="195" text-anchor="middle" class="sub">per run</text>
  <text x="960" y="212" text-anchor="middle" class="sub">under $1 target</text>

  <text x="40" y="280" class="label">Four scorer kinds (run on every task):</text>

  <rect x="40" y="300" width="240" height="60" class="box"/>
  <text x="160" y="324" text-anchor="middle" class="title">json-schema</text>
  <text x="160" y="342" text-anchor="middle" class="sub">format compliance</text>

  <rect x="300" y="300" width="240" height="60" class="box"/>
  <text x="420" y="324" text-anchor="middle" class="title">llm-judge</text>
  <text x="420" y="342" text-anchor="middle" class="sub">versioned prompt</text>

  <rect x="560" y="300" width="240" height="60" class="box"/>
  <text x="680" y="324" text-anchor="middle" class="title">rubric-weighted</text>
  <text x="680" y="342" text-anchor="middle" class="sub">assertion list</text>

  <rect x="820" y="300" width="220" height="60" class="box"/>
  <text x="930" y="324" text-anchor="middle" class="title">four-axis-grader</text>
  <text x="930" y="342" text-anchor="middle" class="sub">correctness / safety</text>

  <text x="40" y="400" class="label">Regression path:</text>
  <rect x="40" y="420" width="1000" height="80" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="540" y="448" text-anchor="middle" class="title">eval run drops below 75% (baseline - 5%)</text>
  <text x="540" y="470" text-anchor="middle" class="sub">EvalRegressionDetectedError fires, CI Gate fails, post-mortem emitted to docs/EVALS/post-mortems/&lt;run-id&gt;.md</text>
</svg>
