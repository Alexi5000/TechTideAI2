<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>TechTideAI run lifecycle and approval gate</title>
  <desc>A run starts queued, transitions through running and approval_requested (when the policy demands a human), and resolves to either succeeded or failed. Every transition is gated by StatusTransitionPolicy and emits an append-only run_event.</desc>

  <style>
    .node { fill: #f1f5f9; stroke: #475569; stroke-width: 1.4; rx: 8; ry: 8; }
    .ok { fill: #dcfce7; stroke: #15803d; stroke-width: 1.4; rx: 8; ry: 8; }
    .bad { fill: #fee2e2; stroke: #b91c1c; stroke-width: 1.4; rx: 8; ry: 8; }
    .approval { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 8; ry: 8; }
    .title { fill: #0f172a; font-weight: 700; }
    .sub { fill: #475569; font-size: 11px; }
    .edge { stroke: #475569; stroke-width: 1.4; fill: none; }
    .edge-warm { stroke: #b45309; stroke-width: 1.6; fill: none; }
    .arrow { fill: #475569; }
    .arrow-warm { fill: #b45309; }
    .inv { fill: #15803d; font-weight: 700; }
    text { fill: #0f172a; }
  </style>

  <!-- Queued -->
  <rect x="20" y="180" width="130" height="60" class="node"/>
  <text x="85" y="204" text-anchor="middle" class="title">queued</text>
  <text x="85" y="222" text-anchor="middle" class="sub">submitted</text>

  <!-- Running -->
  <rect x="190" y="180" width="130" height="60" class="node"/>
  <text x="255" y="204" text-anchor="middle" class="title">running</text>
  <text x="255" y="222" text-anchor="middle" class="sub">tool calls + events</text>

  <!-- Approval requested -->
  <rect x="360" y="180" width="180" height="60" class="approval"/>
  <text x="450" y="204" text-anchor="middle" class="title">approval_requested</text>
  <text x="450" y="222" text-anchor="middle" class="sub">risk tier: billing / destructive</text>

  <!-- Running resumed -->
  <rect x="580" y="180" width="130" height="60" class="node"/>
  <text x="645" y="204" text-anchor="middle" class="title">running</text>
  <text x="645" y="222" text-anchor="middle" class="sub">operator granted</text>

  <!-- Succeeded -->
  <rect x="750" y="180" width="130" height="60" class="ok"/>
  <text x="815" y="204" text-anchor="middle" class="title">succeeded</text>
  <text x="815" y="222" text-anchor="middle" class="sub">output captured</text>

  <!-- Failed -->
  <rect x="750" y="260" width="130" height="60" class="bad"/>
  <text x="815" y="284" text-anchor="middle" class="title">failed</text>
  <text x="815" y="302" text-anchor="middle" class="sub">error or denied</text>

  <!-- Approval denied branch -->
  <rect x="360" y="320" width="180" height="60" class="bad"/>
  <text x="450" y="344" text-anchor="middle" class="title">approval_denied</text>
  <text x="450" y="362" text-anchor="middle" class="sub">operator denied</text>

  <!-- Edges -->
  <path d="M 150 210 L 190 210" class="edge"/>
  <polygon points="184,204 194,212 184,220" class="arrow"/>
  <path d="M 320 210 L 360 210" class="edge-warm"/>
  <polygon points="354,204 364,212 354,220" class="arrow-warm"/>
  <text x="340" y="200" class="sub">policy: high-risk</text>

  <path d="M 540 210 L 580 210" class="edge"/>
  <polygon points="574,204 584,212 574,220" class="arrow"/>
  <text x="560" y="200" class="sub">granted</text>

  <path d="M 580 210 L 750 210" class="edge"/>
  <polygon points="744,204 754,212 744,220" class="arrow"/>

  <path d="M 320 240 L 750 290" class="edge"/>
  <path d="M 540 240 L 450 320" class="edge-warm"/>
  <polygon points="456,316 446,324 456,332" class="arrow-warm"/>
  <text x="500" y="312" class="sub">denied</text>

  <!-- Bottom invariant -->
  <rect x="20" y="400" width="1040" height="60" fill="#dcfce7" stroke="#15803d"/>
  <text x="40" y="424" class="inv">Invariant: every transition emits a run_event with runId, eventType, payload, createdAt.</text>
  <text x="40" y="446" class="sub">StatusTransitionPolicy is the single source of truth for legal transitions. Extend via extend() (OCP), never mutate the default.</text>

  <!-- Edge labels -->
  <text x="40" y="160" class="sub">Form</text>
  <text x="200" y="160" class="sub">Worker</text>
  <text x="380" y="160" class="sub">Policy gate</text>
  <text x="585" y="160" class="sub">Resume</text>
  <text x="755" y="160" class="sub">Done</text>
</svg>
