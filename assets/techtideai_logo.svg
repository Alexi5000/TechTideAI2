<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
  <title>TechTideAI logo mark</title>
  <desc>A logo mark for TechTideAI. A central star (the Local Group Director) with ten orbiting galaxies (the orchestrators) arranged in a ring. The composition is symmetric, dark, and modern.</desc>

  <defs>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="1"/>
      <stop offset="50%" stop-color="#b45309" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6b21a8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="120" cy="120" r="100" fill="none" stroke="url(#ring)" stroke-width="1.2"/>
  <circle cx="120" cy="120" r="86"  fill="none" stroke="#1e293b" stroke-width="0.6" stroke-dasharray="2 4"/>

  <!-- 10 orbiting bodies (orchestrators) -->
  <g fill="#0f172a" stroke="#475569" stroke-width="1.2">
    <circle cx="120" cy="20"  r="9"/>
    <circle cx="186" cy="38"  r="9"/>
    <circle cx="220" cy="120" r="9"/>
    <circle cx="186" cy="202" r="9"/>
    <circle cx="120" cy="220" r="9"/>
    <circle cx="54"  cy="202" r="9"/>
    <circle cx="20"  cy="120" r="9"/>
    <circle cx="54"  cy="38"  r="9"/>
    <circle cx="186" cy="86"  r="6"/>
    <circle cx="54"  cy="154" r="6"/>
  </g>

  <!-- Center star (Local Group Director) -->
  <circle cx="120" cy="120" r="38" fill="url(#center)"/>
  <text x="120" y="120" text-anchor="middle" dominant-baseline="middle"
        font-weight="700" font-size="12" fill="#0f172a">CEO</text>
  <text x="120" y="138" text-anchor="middle"
        font-size="8" fill="#0f172a" opacity="0.7">1+10+50</text>
</svg>
