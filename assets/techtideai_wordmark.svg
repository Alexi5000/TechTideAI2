<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
  <title>TechTideAI wordmark and badge band</title>
  <desc>The TechTideAI wordmark with the project logo on the left and a badge row underneath (build, version, license, topics, languages). The wordmark and the logo share the same dark cosmic background.</desc>

  <style>
    .bg      { fill: #020617; }
    .title   { fill: #f1f5f9; font-weight: 700; }
    .tag     { fill: #94a3b8; }
    .badge   { fill: #1e293b; stroke: #334155; stroke-width: 1; }
    .badge-text { fill: #e2e8f0; font-size: 12px; }
    .badge-accent { fill: #fef3c7; stroke: #b45309; stroke-width: 1; }
  </style>

  <rect width="1280" height="200" class="bg"/>

  <!-- Logo on the left -->
  <g transform="translate(60 60)">
    <circle cx="40" cy="40" r="32" fill="#fef3c7" opacity="0.95"/>
    <circle cx="40" cy="40" r="32" fill="none" stroke="#b45309" stroke-width="1.5"/>
    <circle cx="40" cy="40" r="9" fill="#b45309"/>
    <circle cx="40" cy="10" r="4" fill="#1d4ed8"/>
    <circle cx="68" cy="40" r="4" fill="#1d4ed8"/>
    <circle cx="40" cy="70" r="4" fill="#1d4ed8"/>
    <circle cx="12" cy="40" r="4" fill="#1d4ed8"/>
    <circle cx="62" cy="18" r="3" fill="#475569"/>
    <circle cx="62" cy="62" r="3" fill="#475569"/>
    <circle cx="18" cy="62" r="3" fill="#475569"/>
    <circle cx="18" cy="18" r="3" fill="#475569"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(170 80)">
    <text class="title" font-size="48" letter-spacing="2">TechTideAI</text>
    <text class="tag" y="32" font-size="16">company-scale agent operating system, themed around the Local Group</text>
  </g>

  <!-- Badge row -->
  <g transform="translate(60 156)" font-size="12">
    <!-- build -->
    <g>
      <rect class="badge-accent" x="0" y="0" width="86" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14" fill="#b45309">build passing</text>
    </g>
    <!-- version -->
    <g transform="translate(94 0)">
      <rect class="badge" x="0" y="0" width="80" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">v0.5.0</text>
    </g>
    <!-- license -->
    <g transform="translate(182 0)">
      <rect class="badge" x="0" y="0" width="80" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">MIT license</text>
    </g>
    <!-- 61 agents -->
    <g transform="translate(270 0)">
      <rect class="badge" x="0" y="0" width="92" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">1+10+50 agents</text>
    </g>
    <!-- 33 tasks -->
    <g transform="translate(370 0)">
      <rect class="badge" x="0" y="0" width="124" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">33-task golden suite</text>
    </g>
    <!-- 9 ADRs -->
    <g transform="translate(502 0)">
      <rect class="badge" x="0" y="0" width="76" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">9 ADRs</text>
    </g>
    <!-- typescript -->
    <g transform="translate(586 0)">
      <rect class="badge" x="0" y="0" width="100" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">TypeScript 5.x</text>
    </g>
    <!-- python -->
    <g transform="translate(694 0)">
      <rect class="badge" x="0" y="0" width="86" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">Python 3.11+</text>
    </g>
    <!-- starlette -->
    <g transform="translate(788 0)">
      <rect class="badge" x="0" y="0" width="86" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">FastAPI</text>
    </g>
    <!-- 144 tests -->
    <g transform="translate(882 0)">
      <rect class="badge" x="0" y="0" width="120" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">124 TS + 20 Py tests</text>
    </g>
    <!-- contrib -->
    <g transform="translate(1010 0)">
      <rect class="badge" x="0" y="0" width="80" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">open source</text>
    </g>
    <!-- last commit -->
    <g transform="translate(1098 0)">
      <rect class="badge" x="0" y="0" width="124" height="20" rx="4"/>
      <text class="badge-text" x="9" y="14">last release Jun 25</text>
    </g>
  </g>
</svg>
