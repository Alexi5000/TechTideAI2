<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10">
  <title>TechTideAI agent roster</title>
  <desc>The 61-agent roster as 61 small cells arranged in a galaxy pattern. The Local Group Director at the center; the ten orchestrators in an inner ring; the 50 workers in an outer ring grouped by galaxy.</desc>

  <style>
    .ceo     { fill: #fef3c7; stroke: #b45309; stroke-width: 1.6; }
    .orch    { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.2; }
    .worker  { fill: #f1f5f9; stroke: #475569; stroke-width: 0.8; }
    .title   { fill: #0f172a; font-weight: 700; }
    .sub     { fill: #475569; }
  </style>

  <rect width="1280" height="480" fill="#020617"/>

  <!-- Title -->
  <text x="640" y="32" text-anchor="middle" class="title" font-size="20">TechTideAI agent roster</text>
  <text x="640" y="50" text-anchor="middle" class="sub">1 Local Group Director + 10 galaxies + 50 star-cluster agents</text>

  <!-- CEO at center -->
  <g transform="translate(640 240)">
    <circle r="22" class="ceo"/>
    <text y="-3" text-anchor="middle" font-weight="700" font-size="11" fill="#0f172a">CEO</text>
    <text y="10" text-anchor="middle" font-size="8" fill="#0f172a">Local Group</text>
  </g>

  <!-- 10 orchestrators in inner ring at radius 110 -->
  <g class="orch">
    <g transform="translate(750 240)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Andromeda</text></g>
    <g transform="translate(725 354)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Milky Way</text></g>
    <g transform="translate(640 350)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Triangulum</text></g>
    <g transform="translate(555 354)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Centaurus A</text></g>
    <g transform="translate(530 240)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">M87</text></g>
    <g transform="translate(555 126)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Whirlpool</text></g>
    <g transform="translate(640 130)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Sombrero</text></g>
    <g transform="translate(725 126)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Pinwheel</text></g>
    <g transform="translate(530 354)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Cartwheel</text></g>
    <g transform="translate(750 126)"><circle r="14"/><text y="3" text-anchor="middle" font-size="8" fill="#0f172a">Circinus</text></g>
  </g>

  <!-- 50 workers in outer ring at radius 200, distributed -->
  <g class="worker">
    <!-- Andromeda (5) -->
    <circle cx="900"  cy="240" r="6"/>
    <circle cx="884"  cy="280" r="6"/>
    <circle cx="884"  cy="200" r="6"/>
    <circle cx="912"  cy="312" r="6"/>
    <circle cx="912"  cy="168" r="6"/>
    <!-- Milky Way (5) -->
    <circle cx="864"  cy="430" r="6"/>
    <circle cx="828"  cy="416" r="6"/>
    <circle cx="800"  cy="446" r="6"/>
    <circle cx="892"  cy="402" r="6"/>
    <circle cx="900"  cy="450" r="6"/>
    <!-- Triangulum (5) -->
    <circle cx="700"  cy="448" r="6"/>
    <circle cx="666"  cy="450" r="6"/>
    <circle cx="640"  cy="430" r="6"/>
    <circle cx="734"  cy="446" r="6"/>
    <circle cx="700"  cy="468" r="6"/>
    <!-- Centaurus A (5) -->
    <circle cx="580"  cy="450" r="6"/>
    <circle cx="546"  cy="446" r="6"/>
    <circle cx="514"  cy="446" r="6"/>
    <circle cx="480"  cy="430" r="6"/>
    <circle cx="450"  cy="450" r="6"/>
    <!-- M87 (5) -->
    <circle cx="436"  cy="402" r="6"/>
    <circle cx="380"  cy="402" r="6"/>
    <circle cx="416"  cy="430" r="6"/>
    <circle cx="400"  cy="370" r="6"/>
    <circle cx="368"  cy="380" r="6"/>
    <!-- Whirlpool (5) -->
    <circle cx="430"  cy="98"  r="6"/>
    <circle cx="390"  cy="78"  r="6"/>
    <circle cx="416"  cy="50"  r="6"/>
    <circle cx="450"  cy="32"  r="6"/>
    <circle cx="368"  cy="100" r="6"/>
    <!-- Sombrero (5) -->
    <circle cx="546"  cy="32"  r="6"/>
    <circle cx="580"  cy="32"  r="6"/>
    <circle cx="612"  cy="50"  r="6"/>
    <circle cx="514"  cy="32"  r="6"/>
    <circle cx="668"  cy="32"  r="6"/>
    <!-- Pinwheel (5) -->
    <circle cx="734"  cy="32"  r="6"/>
    <circle cx="772"  cy="32"  r="6"/>
    <circle cx="800"  cy="32"  r="6"/>
    <circle cx="828"  cy="32"  r="6"/>
    <circle cx="866"  cy="50"  r="6"/>
    <!-- Cartwheel (5) -->
    <circle cx="900"  cy="68"  r="6"/>
    <circle cx="930"  cy="86"  r="6"/>
    <circle cx="960"  cy="50"  r="6"/>
    <circle cx="990"  cy="68"  r="6"/>
    <circle cx="1020" cy="86"  r="6"/>
    <!-- Circinus (5) -->
    <circle cx="1050" cy="106" r="6"/>
    <circle cx="1080" cy="124" r="6"/>
    <circle cx="1100" cy="160" r="6"/>
    <circle cx="1110" cy="200" r="6"/>
    <circle cx="1090" cy="240" r="6"/>
  </g>

  <!-- Legend (right side) -->
  <g transform="translate(1180 100)" font-size="10">
    <text class="title" font-size="12">Legend</text>
    <g transform="translate(0 24)">
      <circle r="9" class="ceo"/><text x="16" y="3">CEO (1)</text>
    </g>
    <g transform="translate(0 44)">
      <circle r="9" class="orch"/><text x="16" y="3">Orchestrators (10)</text>
    </g>
    <g transform="translate(0 64)">
      <circle r="6" class="worker"/><text x="16" y="3">Workers (50)</text>
    </g>
    <text y="100" class="sub">Total: 61 agents.</text>
    <text y="116" class="sub">The 61-agent invariant</text>
    <text y="130" class="sub">is asserted in the</text>
    <text y="144" class="sub">registry test.</text>
  </g>

  <!-- Left side: how to read this -->
  <g transform="translate(60 100)" font-size="10">
    <text class="title" font-size="12">How to read this</text>
    <text y="24" class="sub">Center: the Local Group</text>
    <text y="38" class="sub">Director (CEO).</text>
    <text y="58" class="sub">Inner ring: ten galaxy</text>
    <text y="72" class="sub">orchestrators, each</text>
    <text y="86" class="sub">owning a domain.</text>
    <text y="106" class="sub">Outer ring: fifty</text>
    <text y="120" class="sub">star-cluster workers,</text>
    <text y="134" class="sub">five per galaxy.</text>
  </g>
</svg>
